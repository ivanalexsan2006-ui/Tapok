<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tapok · настройки</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #17212b;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            color: white;
            min-height: 100vh;
        }
        .header {
            background: #2a6ee0;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            position: sticky;
            top: 0;
        }
        .back-btn {
            background: transparent;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header h1 {
            font-size: 20px;
            flex: 1;
        }
        .content {
            padding: 20px;
        }
        .section {
            background: #242f3d;
            border-radius: 12px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .section-title {
            padding: 15px;
            background: #1e2b38;
            font-weight: bold;
            color: #8a9aa8;
        }
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #1e2b38;
        }
        .setting-item:last-child {
            border-bottom: none;
        }
        .setting-info {
            flex: 1;
        }
        .setting-name {
            font-weight: bold;
            margin-bottom: 4px;
        }
        .setting-desc {
            font-size: 12px;
            color: #8a9aa8;
        }
        /* Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 28px;
            margin-left: 15px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #1e2b38;
            transition: .3s;
            border-radius: 28px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #2a6ee0;
        }
        input:checked + .slider:before {
            transform: translateX(24px);
        }
        /* Select */
        .select {
            background: #1e2b38;
            color: white;
            border: none;
            padding: 8px 30px 8px 12px;
            border-radius: 20px;
            font-size: 14px;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 8px center;
            background-size: 20px;
        }
        .theme-buttons {
            display: flex;
            gap: 10px;
        }
        .theme-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid #1e2b38;
            background: #1e2b38;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .theme-btn.active {
            background: #2a6ee0;
            border-color: #2a6ee0;
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: #8a9aa8;
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="window.location.href='/profile.html'">←</button>
        <h1>Настройки</h1>
    </div>

    <div class="content" id="content">
        <div class="loading">Загрузка...</div>
    </div>

    <script>
        if (!localStorage.getItem('token')) {
            window.location.href = '/';
        }

        let settings = {};

        async function loadSettings() {
            try {
                const res = await fetch('/api/settings', {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });
                
                settings = await res.json();
                displaySettings();
            } catch (e) {
                console.error('Ошибка загрузки настроек:', e);
            }
        }

        function displaySettings() {
            const content = document.getElementById('content');
            
            content.innerHTML = `
                <!-- Тема -->
                <div class="section">
                    <div class="section-title">Оформление</div>
                    <div class="setting-item">
                        <div class="setting-info">
                            <div class="setting-name">Тема</div>
                            <div class="setting-desc">Светлая или темная</div>
                        </div>
                        <div class="theme-buttons">
                            <button class="theme-btn ${settings.theme === 'dark' ? 'active' : ''}" onclick="setTheme('dark')">🌙 Темная</button>
                            <button class="theme-btn ${settings.theme === 'light' ? 'active' : ''}" onclick="setTheme('light')">☀️ Светлая</button>
                        </div>
                    </div>
                </div>

                <!-- Приватность -->
                <div class="section">
                    <div class="section-title">Приватность</div>
                    
                    <div class="setting-item">
                        <div class="setting-info">
                            <div class="setting-name">Кто может писать</div>
                            <div class="setting-desc">Ограничьте круг лиц</div>
                        </div>
                        <select class="select" onchange="setWhoCanWrite(this.value)">
                            <option value="all" ${settings.who_can_write === 'all' ? 'selected' : ''}>Все</option>
                            <option value="contacts" ${settings.who_can_write === 'contacts' ? 'selected' : ''}>Только контакты</option>
                        </select>
                    </div>

                    <div class="setting-item">
                        <div class="setting-info">
                            <div class="setting-name">Скрыть телефон</div>
                            <div class="setting-desc">Номер не будет виден другим</div>
                        </div>
                        <label class="switch">
                            <input type="checkbox" ${settings.hide_phone ? 'checked' : ''} onchange="setHidePhone(this.checked)">
                            <span class="slider"></span>
                        </label>
                    </div>

                    <div class="setting-item">
                        <div class="setting-info">
                            <div class="setting-name">Скрыть статус</div>
                            <div class="setting-desc">Никто не видит "онлайн/офлайн"</div>
                        </div>
                        <label class="switch">
                            <input type="checkbox" ${settings.hide_status ? 'checked' : ''} onchange="setHideStatus(this.checked)">
                            <span class="slider"></span>
                        </label>
                    </div>

                    <div class="setting-item">
                        <div class="setting-info">
                            <div class="setting-name">Скрыть аватар</div>
                            <div class="setting-desc">Фото профиля не видно другим</div>
                        </div>
                        <label class="switch">
                            <input type="checkbox" ${settings.hide_avatar ? 'checked' : ''} onchange="setHideAvatar(this.checked)">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>

                <!-- Инфо -->
                <div class="section">
                    <div class="section-title">О приложении</div>
                    <div class="setting-item">
                        <div class="setting-info">
                            <div class="setting-name">Версия</div>
                            <div class="setting-desc">Tapok 7.0</div>
                        </div>
                    </div>
                </div>
            `;
        }

        async function setTheme(theme) {
            try {
                await fetch('/api/settings', {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ theme })
                });
                
                settings.theme = theme;
                displaySettings();
                
                // Применяем тему
                document.body.style.background = theme === 'light' ? '#f5f5f5' : '#17212b';
                document.body.style.color = theme === 'light' ? '#000' : '#fff';
            } catch (e) {
                console.error('Ошибка:', e);
            }
        }

        async function setWhoCanWrite(value) {
            await fetch('/api/settings', {
                method: 'PUT',
                headers: {
                    'Authorization': `Bearer ${localStorage.getItem('token')}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ who_can_write: value })
            });
        }

        async function setHidePhone(value) {
            await fetch('/api/settings', {
                method: 'PUT',
                headers: {
                    'Authorization': `Bearer ${localStorage.getItem('token')}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ hide_phone: value })
            });
        }

        async function setHideStatus(value) {
            await fetch('/api/settings', {
                method: 'PUT',
                headers: {
                    'Authorization': `Bearer ${localStorage.getItem('token')}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ hide_status: value })
            });
        }

        async function setHideAvatar(value) {
            await fetch('/api/settings', {
                method: 'PUT',
                headers: {
                    'Authorization': `Bearer ${localStorage.getItem('token')}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ hide_avatar: value })
            });
        }

        loadSettings();
    </script>
</body>
</html>
