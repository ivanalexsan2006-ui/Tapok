<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tapok · настройки</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* ===== ТЕМНАЯ ТЕМА ===== */
        body.dark {
            background: #17212b;
            color: white;
        }
        body.dark .header { background: #2a6ee0; }
        body.dark .section { background: #242f3d; }
        body.dark .section-title { background: #1e2b38; color: #8a9aa8; }
        body.dark .setting-item { border-bottom-color: #1e2b38; }
        body.dark .setting-desc { color: #8a9aa8; }
        body.dark .select { background: #1e2b38; color: white; }
        body.dark .theme-btn { background: #1e2b38; color: white; }
        
        /* ===== СВЕТЛАЯ ТЕМА ===== */
        body.light {
            background: #f5f5f5;
            color: #000000;
        }
        body.light .header { background: #2a6ee0; color: white; }
        body.light .section { background: white; }
        body.light .section-title { 
            background: #eaeaea; 
            color: #666;
            border-bottom: 1px solid #ddd;
        }
        body.light .setting-item { border-bottom-color: #eaeaea; }
        body.light .setting-desc { color: #666; }
        body.light .select { 
            background: #f5f5f5; 
            color: #000000;
            border: 1px solid #ddd;
        }
        body.light .theme-btn { 
            background: #eaeaea; 
            color: #000000;
            border: 1px solid #ddd;
        }
        body.light .theme-btn.active {
            background: #2a6ee0;
            color: white;
            border-color: #2a6ee0;
        }
        body.light .back-btn { color: white; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }
        
        .header {
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            position: sticky;
            top: 0;
            transition: background 0.3s;
        }
        
        .back-btn {
            background: transparent;
            border: none;
            font-size: 24px;
            cursor: pointer;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        .header h1 {
            font-size: 20px;
            flex: 1;
            color: white;
        }
        
        .content {
            padding: 20px;
        }
        
        .section {
            border-radius: 12px;
            margin-bottom: 20px;
            overflow: hidden;
            transition: background 0.3s;
        }
        
        .section-title {
            padding: 15px;
            font-weight: bold;
            transition: background 0.3s, color 0.3s;
        }
        
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid transparent;
            transition: border-color 0.3s;
        }
        .setting-item:last-child {
            border-bottom: none;
        }
        
        .setting-info {
            flex: 1;
        }
        
        .setting-name {
            font-weight: bold;
            margin-bottom: 4px;
        }
        
        .setting-desc {
            font-size: 12px;
            transition: color 0.3s;
        }
        
        /* Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 28px;
            margin-left: 15px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #1e2b38;
            transition: .3s;
            border-radius: 28px;
        }
        body.light .slider {
            background-color: #ccc;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #2a6ee0;
        }
        input:checked + .slider:before {
            transform: translateX(24px);
        }
        
        /* Select */
        .select {
            padding: 8px 30px 8px 12px;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%238a9aa8'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 8px center;
            background-size: 20px;
            transition: background 0.3s, color 0.3s, border 0.3s;
        }
        
        /* Theme buttons */
        .theme-buttons {
            display: flex;
            gap: 10px;
        }
        
        .theme-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .theme-btn.active {
            background: #2a6ee0;
            color: white;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #8a9aa8;
        }
    </style>
</head>
<body class="dark">
    <div class="header">
        <button class="back-btn" onclick="window.location.href='/chats.html'">←</button>
        <h1>Настройки</h1>
    </div>

    <div class="content" id="content">
        <div class="loading">Загрузка...</div>
    </div>

    <script>
        if (!localStorage.getItem('token')) {
            window.location.href = '/';
        }

        let settings = {};

        // Загружаем тему при старте
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.body.className = savedTheme;

        async function loadSettings() {
            try {
                const res = await fetch('/api/settings', {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });
                
                settings = await res.json();
                
                // Если тема не совпадает с сохраненной в localStorage, обновляем
                if (settings.theme !== savedTheme) {
                    settings.theme = savedTheme;
                }
                
                displaySettings();
            } catch (e) {
                console.error('Ошибка загрузки настроек:', e);
            }
        }

        function displaySettings() {
            const content = document.getElementById('content');
            
            content.innerHTML = `
                <!-- Тема -->
                <div class="section">
                    <div class="section-title">Оформление</div>
                    <div class="setting-item">
                        <div class="setting-info">
                            <div class="setting-name">Тема</div>
                            <div class="setting-desc">Выберите оформление</div>
                        </div>
                        <div class="theme-buttons">
                            <button class="theme-btn ${settings.theme === 'dark' ? 'active' : ''}" onclick="setTheme('dark')">🌙 Темная</button>
                            <button class="theme-btn ${settings.theme === 'light' ? 'active' : ''}" onclick="setTheme('light')">☀️ Светлая</button>
                        </div>
                    </div>
                </div>

                <!-- Приватность -->
                <div class="section">
                    <div class="section-title">Приватность</div>
                    
                    <div class="setting-item">
                        <div class="setting-info">
                            <div class="setting-name">Кто может писать</div>
                            <div class="setting-desc">Ограничьте круг лиц, которые могут вам писать</div>
                        </div>
                        <select class="select" onchange="setWhoCanWrite(this.value)">
                            <option value="all" ${settings.who_can_write === 'all' ? 'selected' : ''}>Все</option>
                            <option value="contacts" ${settings.who_can_write === 'contacts' ? 'selected' : ''}>Только контакты</option>
                        </select>
                    </div>

                    <div class="setting-item">
                        <div class="setting-info">
                            <div class="setting-name">Скрыть телефон</div>
                            <div class="setting-desc">Номер не будет виден другим пользователям</div>
                        </div>
                        <label class="switch">
                            <input type="checkbox" ${settings.hide_phone ? 'checked' : ''} onchange="setHidePhone(this.checked)">
                            <span class="slider"></span>
                        </label>
                    </div>

                    <div class="setting-item">
                        <div class="setting-info">
                            <div class="setting-name">Скрыть статус</div>
                            <div class="setting-desc">Никто не будет видеть "онлайн/офлайн"</div>
                        </div>
                        <label class="switch">
                            <input type="checkbox" ${settings.hide_status ? 'checked' : ''} onchange="setHideStatus(this.checked)">
                            <span class="slider"></span>
                        </label>
                    </div>

                    <div class="setting-item">
                        <div class="setting-info">
                            <div class="setting-name">Скрыть аватар</div>
                            <div class="setting-desc">Фото профиля не будет видно другим</div>
                        </div>
                        <label class="switch">
                            <input type="checkbox" ${settings.hide_avatar ? 'checked' : ''} onchange="setHideAvatar(this.checked)">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>

                <!-- Данные -->
                <div class="section">
                    <div class="section-title">Данные</div>
                    
                    <div class="setting-item">
                        <div class="setting-info">
                            <div class="setting-name">Очистить историю</div>
                            <div class="setting-desc">Удалить все сообщения (необратимо)</div>
                        </div>
                        <button class="theme-btn" onclick="clearHistory()" style="flex: 0 0 auto; padding: 8px 15px;">Очистить</button>
                    </div>
                </div>

                <!-- Информация -->
                <div class="section">
                    <div class="section-title">О приложении</div>
                    
                    <div class="setting-item">
                        <div class="setting-info">
                            <div class="setting-name">Версия</div>
                            <div class="setting-desc">Tapok 7.0</div>
                        </div>
                    </div>
                    
                    <div class="setting-item">
                        <div class="setting-info">
                            <div class="setting-name">Разработчик</div>
                            <div class="setting-desc">@ivanalexsan2006-ui</div>
                        </div>
                    </div>
                </div>
            `;
        }

        // ===== УПРАВЛЕНИЕ ТЕМОЙ =====
        async function setTheme(theme) {
            try {
                await fetch('/api/settings', {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ theme })
                });
                
                settings.theme = theme;
                document.body.className = theme;
                localStorage.setItem('theme', theme);
                
                // Обновляем активные кнопки
                document.querySelectorAll('.theme-btn').forEach(btn => {
                    btn.classList.remove('active');
                });
                document.querySelectorAll('.theme-btn')[theme === 'dark' ? 0 : 1].classList.add('active');
                
            } catch (e) {
                console.error('Ошибка:', e);
            }
        }

        // ===== НАСТРОЙКИ ПРИВАТНОСТИ =====
        async function setWhoCanWrite(value) {
            await fetch('/api/settings', {
                method: 'PUT',
                headers: {
                    'Authorization': `Bearer ${localStorage.getItem('token')}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ who_can_write: value })
            });
        }

        async function setHidePhone(value) {
            await fetch('/api/settings', {
                method: 'PUT',
                headers: {
                    'Authorization': `Bearer ${localStorage.getItem('token')}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ hide_phone: value })
            });
        }

        async function setHideStatus(value) {
            await fetch('/api/settings', {
                method: 'PUT',
                headers: {
                    'Authorization': `Bearer ${localStorage.getItem('token')}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ hide_status: value })
            });
        }

        async function setHideAvatar(value) {
            await fetch('/api/settings', {
                method: 'PUT',
                headers: {
                    'Authorization': `Bearer ${localStorage.getItem('token')}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ hide_avatar: value })
            });
        }

        // ===== ОЧИСТКА ИСТОРИИ =====
        async function clearHistory() {
            if (!confirm('Вы уверены? Это действие нельзя отменить.')) return;
            
            // TODO: добавить API для очистки истории
            alert('Функция в разработке');
        }

        loadSettings();
    </script>
</body>
</html>
