<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tapok · вход</title>
    
    <!-- Иконки для всех устройств -->
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192.png">
    
    <!-- Манифест -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- Цвета для мобильных -->
    <meta name="theme-color" content="#2a6ee0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tapok">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #17212b;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: #242f3d;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        h1 { 
            text-align: center; 
            margin-bottom: 30px; 
            color: #2a6ee0;
            font-size: 32px;
        }
        .tab {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid #17212b;
        }
        .tab button {
            flex: 1;
            padding: 10px;
            background: transparent;
            border: none;
            color: #8a9aa8;
            cursor: pointer;
            font-size: 16px;
            transition: color 0.2s;
        }
        .tab button.active {
            color: #2a6ee0;
            border-bottom: 2px solid #2a6ee0;
        }
        input, button {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border-radius: 10px;
            border: none;
            font-size: 16px;
        }
        input {
            background: #17212b;
            color: white;
            outline: none;
        }
        input:focus {
            outline: 2px solid #2a6ee0;
        }
        button {
            background: #2a6ee0;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #1e4fa0; }
        button:active { transform: scale(0.98); }
        .error {
            color: #f44336;
            margin-top: 10px;
            font-size: 14px;
            text-align: center;
        }
        .hidden { display: none; }
        .file-input {
            padding: 8px;
            background: #17212b;
            border-radius: 10px;
            margin: 8px 0;
        }
        .file-input input {
            margin: 0;
            padding: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tapok</h1>
        
        <div class="tab">
            <button id="tab-login" class="active">Вход</button>
            <button id="tab-register">Регистрация</button>
        </div>

        <!-- Форма входа -->
        <div id="login-form">
            <input type="tel" id="login-phone" placeholder="Номер телефона" value="+7" oninput="formatPhone(this)">
            <button onclick="login()">Войти</button>
        </div>

        <!-- Форма регистрации -->
        <div id="register-form" class="hidden">
            <input type="tel" id="reg-phone" placeholder="Номер телефона" value="+7" oninput="formatPhone(this)">
            <input type="text" id="reg-name" placeholder="Ваше имя">
            <input type="text" id="reg-username" placeholder="@username (необязательно)">
            <input type="password" id="reg-password" placeholder="Пароль для всех">
            <div class="file-input">
                <input type="file" id="reg-avatar" accept="image/*">
            </div>
            <button onclick="register()">Зарегистрироваться</button>
        </div>

        <div id="error" class="error"></div>
    </div>

    <script>
        function formatPhone(input) {
            let value = input.value.replace(/[^\d+]/g, '');
            if (!value.startsWith('+')) {
                value = '+7' + value.replace(/^\+?7?/, '');
            }
            input.value = value;
        }

        document.getElementById('tab-login').addEventListener('click', () => {
            document.getElementById('tab-login').classList.add('active');
            document.getElementById('tab-register').classList.remove('active');
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('register-form').classList.add('hidden');
            hideError();
        });

        document.getElementById('tab-register').addEventListener('click', () => {
            document.getElementById('tab-register').classList.add('active');
            document.getElementById('tab-login').classList.remove('active');
            document.getElementById('register-form').classList.remove('hidden');
            document.getElementById('login-form').classList.add('hidden');
            hideError();
        });

        async function register() {
            const phone = document.getElementById('reg-phone').value.trim();
            const name = document.getElementById('reg-name').value.trim();
            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value;
            const avatarFile = document.getElementById('reg-avatar').files[0];

            if (!phone || !name || !password) {
                showError('Заполните все поля');
                return;
            }

            const formData = new FormData();
            formData.append('phone', phone);
            formData.append('name', name);
            formData.append('username', username);
            formData.append('password', password);
            if (avatarFile) formData.append('avatar', avatarFile);

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    body: formData
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/chats.html';
                } else {
                    showError(data.error || 'Ошибка регистрации');
                }
            } catch (e) {
                showError('Ошибка соединения с сервером');
            }
        }

        async function login() {
            const phone = document.getElementById('login-phone').value.trim();

            if (!phone) {
                showError('Введите номер телефона');
                return;
            }

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/chats.html';
                } else {
                    showError(data.error || 'Ошибка входа');
                }
            } catch (e) {
                showError('Ошибка соединения с сервером');
            }
        }

        function showError(msg) {
            document.getElementById('error').textContent = msg;
        }

        function hideError() {
            document.getElementById('error').textContent = '';
        }

        if (localStorage.getItem('token')) {
            window.location.href = '/chats.html';
        }
    </script>

    <!-- ЕДИНАЯ РЕГИСТРАЦИЯ SERVICE WORKER -->
    <script src="/sw-register.js"></script>
</body>
</html>
