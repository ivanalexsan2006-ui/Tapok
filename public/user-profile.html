<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tapok · пользователь</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* ===== ТЕМНАЯ ТЕМА ===== */
        body.dark {
            background: #17212b;
            color: white;
        }
        body.dark .header { background: #2a6ee0; }
        body.dark .info-card { background: #242f3d; }
        body.dark .info-label { color: #8a9aa8; }
        body.dark .modal-content { background: #242f3d; }
        body.dark .rename-input { background: #17212b; color: white; }
        
        /* ===== СВЕТЛАЯ ТЕМА ===== */
        body.light {
            background: #f5f5f5;
            color: #000000;
        }
        body.light .header { background: #2a6ee0; color: white; }
        body.light .info-card { background: white; }
        body.light .info-label { color: #666; }
        body.light .modal-content { background: white; color: #000000; }
        body.light .rename-input { 
            background: #f5f5f5; 
            color: #000000;
            border: 1px solid #ddd;
        }
        body.light .close-btn { color: #000000; }
        body.light .privacy-notice { color: #666; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.3s, color 0.3s;
        }
        
        .header {
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            position: sticky;
            top: 0;
            transition: background 0.3s;
        }
        
        .back-btn {
            background: transparent;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .header h1 {
            font-size: 20px;
            flex: 1;
        }
        
        .profile-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .avatar-container {
            margin-bottom: 20px;
            position: relative;
        }
        
        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #2a6ee0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: white;
            overflow: hidden;
            border: 3px solid #2a6ee0;
        }
        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .rename-badge {
            position: absolute;
            bottom: 0;
            right: 0;
            background: #2a6ee0;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid white;
        }
        
        .info-card {
            border-radius: 12px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
            transition: background 0.3s;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(128,128,128,0.2);
        }
        .info-row:last-child {
            border-bottom: none;
        }
        
        .info-label {
            transition: color 0.3s;
        }
        
        .info-value {
            font-weight: bold;
        }
        .info-value.hidden-info {
            opacity: 0.5;
            font-style: italic;
        }
        
        .display-name {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
            text-align: center;
        }
        
        .original-name {
            font-size: 14px;
            color: #8a9aa8;
            margin-bottom: 20px;
            text-align: center;
            cursor: pointer;
            text-decoration: underline dotted;
        }
        
        .status-badge {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .status-online { background: #4caf50; }
        .status-offline { background: #9e9e9e; }
        .status-hidden { background: #8a9aa8; }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 400px;
        }
        
        .action-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .action-btn:active {
            transform: scale(0.98);
        }
        
        .message-btn {
            background: #2a6ee0;
            color: white;
        }
        
        .chat-btn {
            background: #00a884;
            color: white;
        }
        
        .cant-write-btn {
            background: #1e2b38;
            color: #8a9aa8;
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        .privacy-notice {
            font-size: 12px;
            text-align: center;
            margin-top: 10px;
            max-width: 400px;
        }
        
        /* ===== МОДАЛКА ПЕРЕИМЕНОВАНИЯ ===== */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.hidden { display: none; }
        
        .modal-content {
            padding: 20px;
            border-radius: 15px;
            width: 90%;
            max-width: 350px;
            transition: background 0.3s, color 0.3s;
        }
        
        .modal-content h3 {
            margin-bottom: 15px;
        }
        
        .rename-input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
        }
        
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }
        
        .save-btn {
            background: #2a6ee0;
            color: white;
        }
        
        .reset-btn {
            background: #f44336;
            color: white;
        }
        
        .cancel-btn {
            background: #1e2b38;
            color: white;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #8a9aa8;
        }
        
        .hidden { display: none; }
    </style>
</head>
<body class="dark">
    <div class="header">
        <button class="back-btn" onclick="window.history.back()">←</button>
        <h1>Профиль</h1>
    </div>

    <div class="profile-content" id="profile-content">
        <div class="loading">Загрузка...</div>
    </div>

    <!-- Модалка переименования -->
    <div class="modal hidden" id="rename-modal">
        <div class="modal-content">
            <h3 id="rename-modal-title">Изменить имя контакта</h3>
            <input type="text" class="rename-input" id="rename-input" placeholder="Новое имя" maxlength="50">
            <div class="modal-buttons">
                <button class="save-btn" onclick="saveRename()">Сохранить</button>
                <button class="reset-btn" id="reset-rename-btn" onclick="resetRename()">Сбросить</button>
                <button class="cancel-btn" onclick="closeRenameModal()">Отмена</button>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');
        const currentUser = JSON.parse(localStorage.getItem('user') || '{}');
        let currentUserData = null;
        let ws;

        if (!localStorage.getItem('token')) {
            window.location.href = '/';
        }

        if (!userId) {
            window.location.href = '/chats.html';
        }

        // Загружаем тему
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.body.className = savedTheme;

        // Загрузка данных пользователя
        async function loadUserProfile() {
            try {
                const res = await fetch(`/api/users/${userId}`, {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });
                
                if (!res.ok) throw new Error('Пользователь не найден');
                
                const user = await res.json();
                currentUserData = user;
                displayProfile(user);
                setupActionButtons(user);
            } catch (e) {
                console.error('Ошибка загрузки профиля:', e);
                document.getElementById('profile-content').innerHTML = '<div style="text-align: center; padding: 50px; color: #f44336;">Пользователь не найден</div>';
            }
        }

        function displayProfile(user) {
            const content = document.getElementById('profile-content');
            
            const displayName = user.customName || user.name;
            const statusClass = user.status === 'online' ? 'status-online' : 
                               user.status === 'hidden' ? 'status-hidden' : 'status-offline';
            const statusText = user.status === 'online' ? 'онлайн' : 
                              user.status === 'hidden' ? 'скрыт' : 'офлайн';
            
            const avatarHtml = user.avatar ? 
                `<img src="${user.avatar}">` : 
                (user.name ? user.name[0].toUpperCase() : '?');

            content.innerHTML = `
                <div class="avatar-container">
                    <div class="profile-avatar" id="avatar-display">
                        ${avatarHtml}
                    </div>
                    <div class="rename-badge" onclick="showRenameModal()">✎</div>
                </div>
                
                <div class="display-name" id="display-name">${displayName}</div>
                ${user.customName ? 
                    `<div class="original-name" onclick="showRenameModal()">Оригинал: ${user.name}</div>` : 
                    ''}
                
                <div class="info-card">
                    <div class="info-row">
                        <span class="info-label">Username</span>
                        <span class="info-value">${user.username ? `@${user.username}` : '—'}</span>
                    </div>
                    
                    <div class="info-row">
                        <span class="info-label">Телефон</span>
                        <span class="info-value ${user.phone ? '' : 'hidden-info'}">
                            ${user.phone || 'скрыт'}
                        </span>
                    </div>
                    
                    <div class="info-row">
                        <span class="info-label">Статус</span>
                        <span class="info-value">
                            <span class="status-badge ${statusClass}"></span>
                            ${statusText}
                        </span>
                    </div>
                </div>

                <div class="action-buttons" id="action-buttons"></div>
                <div class="privacy-notice" id="privacy-notice"></div>
            `;
        }

        function setupActionButtons(user) {
            const buttonsDiv = document.getElementById('action-buttons');
            const noticeDiv = document.getElementById('privacy-notice');
            
            if (user.existing_chat_id) {
                buttonsDiv.innerHTML = `
                    <button class="action-btn chat-btn" onclick="openChat(${user.existing_chat_id})">
                        💬 Перейти в чат
                    </button>
                `;
            } else {
                if (user.who_can_write === 'contacts') {
                    checkIfInContacts(user).then(isInContacts => {
                        if (isInContacts) {
                            buttonsDiv.innerHTML = `
                                <button class="action-btn message-btn" onclick="createPrivateChat(${user.id})">
                                    ✉️ Написать сообщение
                                </button>
                            `;
                        } else {
                            buttonsDiv.innerHTML = `
                                <button class="action-btn cant-write-btn" disabled>
                                    🔒 Только контакты
                                </button>
                            `;
                            noticeDiv.textContent = 'Этот пользователь разрешил писать только контактам';
                        }
                    });
                } else {
                    buttonsDiv.innerHTML = `
                        <button class="action-btn message-btn" onclick="createPrivateChat(${user.id})">
                            ✉️ Написать сообщение
                        </button>
                    `;
                }
            }
        }

        async function checkIfInContacts(user) {
            try {
                const res = await fetch('/api/contacts', {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });
                
                const contacts = await res.json();
                return contacts.some(c => c.id === user.id);
            } catch (e) {
                console.error('Ошибка проверки контактов:', e);
                return false;
            }
        }

        // ===== ПЕРЕИМЕНОВАНИЕ КОНТАКТА =====
        function showRenameModal() {
            document.getElementById('rename-input').value = currentUserData.customName || currentUserData.name || '';
            document.getElementById('rename-modal').classList.remove('hidden');
            
            // Показываем кнопку сброса только если есть кастомное имя
            document.getElementById('reset-rename-btn').style.display = 
                currentUserData.customName ? 'block' : 'none';
        }

        function closeRenameModal() {
            document.getElementById('rename-modal').classList.add('hidden');
        }

        async function saveRename() {
            const newName = document.getElementById('rename-input').value.trim();
            
            if (!newName) {
                alert('Имя не может быть пустым');
                return;
            }

            try {
                const res = await fetch('/api/contacts/rename', {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        contactUserId: parseInt(userId),
                        customName: newName
                    })
                });

                if (res.ok) {
                    currentUserData.customName = newName;
                    document.getElementById('display-name').textContent = newName;
                    
                    // Добавляем или обновляем строку с оригинальным именем
                    const originalDiv = document.querySelector('.original-name');
                    if (originalDiv) {
                        originalDiv.innerHTML = `Оригинал: ${currentUserData.name}`;
                    } else {
                        const displayNameDiv = document.querySelector('.display-name');
                        displayNameDiv.insertAdjacentHTML('afterend', 
                            `<div class="original-name" onclick="showRenameModal()">Оригинал: ${currentUserData.name}</div>`);
                    }
                    
                    closeRenameModal();
                } else {
                    alert('Ошибка при переименовании');
                }
            } catch (e) {
                console.error('Ошибка:', e);
                alert('Ошибка соединения');
            }
        }

        async function resetRename() {
            if (!confirm('Вернуть оригинальное имя?')) return;

            try {
                const res = await fetch('/api/contacts/rename', {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        contactUserId: parseInt(userId)
                    })
                });

                if (res.ok) {
                    currentUserData.customName = null;
                    document.getElementById('display-name').textContent = currentUserData.name;
                    
                    // Удаляем строку с оригинальным именем
                    const originalDiv = document.querySelector('.original-name');
                    if (originalDiv) originalDiv.remove();
                    
                    closeRenameModal();
                } else {
                    alert('Ошибка при сбросе имени');
                }
            } catch (e) {
                console.error('Ошибка:', e);
                alert('Ошибка соединения');
            }
        }

        // ===== СОЗДАНИЕ ЧАТА =====
        async function createPrivateChat(otherUserId) {
            try {
                const res = await fetch('/api/chats', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        participants: [otherUserId],
                        isGroup: false
                    })
                });

                if (!res.ok) throw new Error('Ошибка создания чата');

                const chat = await res.json();
                window.location.href = `/chat.html?id=${chat.id}`;
            } catch (e) {
                console.error('Ошибка создания чата:', e);
                alert('Не удалось создать чат');
            }
        }

        function openChat(chatId) {
            window.location.href = `/chat.html?id=${chatId}`;
        }

        // WebSocket для статуса
        function connectWS() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}`);

            ws.onopen = () => {
                ws.send(JSON.stringify({
                    type: 'auth',
                    token: localStorage.getItem('token')
                }));
            };

            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.type === 'user_status' && data.userId === parseInt(userId)) {
                    const statusBadge = document.getElementById('status-badge');
                    const statusText = document.getElementById('status-text');
                    
                    if (statusBadge && statusText) {
                        if (data.status === 'online') {
                            statusBadge.className = 'status-badge status-online';
                            statusText.textContent = 'онлайн';
                        } else {
                            statusBadge.className = 'status-badge status-offline';
                            statusText.textContent = 'офлайн';
                        }
                    }
                }
            };
        }

        // Закрытие модалки по клику вне
        document.getElementById('rename-modal').addEventListener('click', function(e) {
            if (e.target === this) closeRenameModal();
        });

        loadUserProfile();
        connectWS();
    </script>
</body>
</html>
