<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tapok · группа</title>
    <!-- Иконки для всех устройств -->
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192.png">

    <!-- Манифест -->
    <link rel="manifest" href="/manifest.json">

    <!-- Цвета для мобильных -->
    <meta name="theme-color" content="#2a6ee0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tapok">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #17212b;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #2a6ee0;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            position: sticky;
            top: 0;
        }
        .back-btn {
            background: transparent;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header h1 {
            font-size: 20px;
            flex: 1;
        }
        .group-content {
            padding: 20px;
        }
        .group-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #2a6ee0;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        .group-name {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .group-meta {
            text-align: center;
            color: #8a9aa8;
            margin-bottom: 30px;
        }
        .section-title {
            font-size: 16px;
            margin-bottom: 15px;
            color: #8a9aa8;
        }
        .participants-list {
            background: #242f3d;
            border-radius: 12px;
            overflow: hidden;
        }
        .participant-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid #1e2b38;
            cursor: pointer;
            transition: background 0.2s;
        }
        .participant-item:last-child {
            border-bottom: none;
        }
        .participant-item:hover {
            background: #17212b;
        }
        .participant-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #2a6ee0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            overflow: hidden;
        }
        .participant-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .participant-info {
            flex: 1;
        }
        .participant-name {
            font-weight: bold;
            margin-bottom: 2px;
        }
        .participant-status {
            font-size: 12px;
            color: #8a9aa8;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .status-badge {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-online { background: #4caf50; }
        .status-offline { background: #9e9e9e; }
        .admin-badge {
            background: #2a6ee0;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 5px;
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: #8a9aa8;
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="window.history.back()">←</button>
        <h1>Информация о группе</h1>
    </div>

    <div class="group-content">
        <div class="group-avatar" id="group-avatar">👥</div>
        <div class="group-name" id="group-name">Загрузка...</div>
        <div class="group-meta" id="group-meta"></div>

        <div class="section-title">Участники</div>
        <div class="participants-list" id="participants-list">
            <div class="loading">Загрузка участников...</div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const chatId = urlParams.get('id');
        const currentUser = JSON.parse(localStorage.getItem('user') || '{}');

        if (!localStorage.getItem('token')) {
            window.location.href = '/';
        }

        if (!chatId) {
            window.location.href = '/chats.html';
        }

        async function loadGroupInfo() {
            try {
                const res = await fetch(`/api/chats/${chatId}`, {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });

                if (!res.ok) throw new Error('Группа не найдена');

                const chat = await res.json();
                
                if (!chat.is_group) {
                    window.location.href = `/user-profile.html?id=${chat.participants?.find(p => p.id !== currentUser.id)?.id}`;
                    return;
                }

                displayGroupInfo(chat);
                displayParticipants(chat.participants || []);
            } catch (e) {
                console.error('Ошибка загрузки группы:', e);
                document.body.innerHTML = '<div style="text-align: center; padding: 50px; color: #f44336;">Группа не найдена</div>';
            }
        }

        function displayGroupInfo(chat) {
            document.getElementById('group-name').textContent = chat.name || 'Группа';
            document.getElementById('group-meta').textContent = `${chat.participants?.length || 0} участников`;
        }

        function displayParticipants(participants) {
            const list = document.getElementById('participants-list');
            
            if (!participants || participants.length === 0) {
                list.innerHTML = '<div class="loading">Нет участников</div>';
                return;
            }

            list.innerHTML = participants.map(p => {
                const isAdmin = p.is_admin ? '<span class="admin-badge">админ</span>' : '';
                const statusClass = p.status === 'online' ? 'status-online' : 'status-offline';
                const statusText = p.status === 'online' ? 'онлайн' : 'офлайн';
                
                const avatar = p.avatar ? `<img src="${p.avatar}">` : (p.name ? p.name[0].toUpperCase() : '?');

                return `
                    <div class="participant-item" onclick="window.location.href='/user-profile.html?id=${p.id}'">
                        <div class="participant-avatar">${avatar}</div>
                        <div class="participant-info">
                            <div class="participant-name">
                                ${p.name || 'Без имени'} ${isAdmin}
                            </div>
                            <div class="participant-status">
                                <span class="status-badge ${statusClass}"></span>
                                ${statusText}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        loadGroupInfo();
    </script>

    <!-- ЕДИНАЯ РЕГИСТРАЦИЯ SERVICE WORKER -->
    <script src="/sw-register.js"></script>
</body>
</html>
