<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tapok · чат</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #17212b;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #2a6ee0;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .back-btn {
            background: transparent;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        .chat-name {
            font-size: 18px;
            font-weight: bold;
        }
        .chat-status {
            font-size: 12px;
            opacity: 0.8;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }
        .message {
            max-width: 70%;
            padding: 8px 12px;
            border-radius: 18px;
            margin-bottom: 8px;
        }
        .my-message {
            align-self: flex-end;
            background: #2a6ee0;
        }
        .their-message {
            align-self: flex-start;
            background: #242f3d;
        }
        .message-time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 4px;
        }
        .message-media {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
        }
        .input-area {
            padding: 10px;
            background: #1e2b38;
            display: flex;
            gap: 10px;
        }
        .message-input {
            flex: 1;
            padding: 10px;
            background: #242f3d;
            border: none;
            border-radius: 20px;
            color: white;
        }
        .send-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #2a6ee0;
            border: none;
            color: white;
            cursor: pointer;
        }
        .typing {
            color: #8a9aa8;
            font-size: 12px;
            padding: 5px 15px;
            font-style: italic;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="window.location.href='/chats.html'">←</button>
        <div>
            <div class="chat-name" id="chat-name">Загрузка...</div>
            <div class="chat-status" id="chat-status"></div>
        </div>
    </div>

    <div class="messages" id="messages"></div>
    <div class="typing hidden" id="typing">печатает...</div>

    <div class="input-area">
        <input type="text" class="message-input" id="message-input" placeholder="Сообщение">
        <button class="send-btn" onclick="sendMessage()">📤</button>
    </div>

    <script>
        const chatId = new URLSearchParams(window.location.search).get('id');
        const currentUser = JSON.parse(localStorage.getItem('user') || '{}');
        let ws;

        if (!localStorage.getItem('token') || !chatId) {
            window.location.href = '/';
        }

        // WebSocket
        function connectWS() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}`);

            ws.onopen = () => {
                ws.send(JSON.stringify({
                    type: 'auth',
                    token: localStorage.getItem('token')
                }));
            };

            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.type === 'new_message' && data.chatId == chatId) {
                    addMessage(data.message, data.message.user_id !== currentUser.id);
                }
                if (data.type === 'typing' && data.chatId == chatId && data.userId !== currentUser.id) {
                    document.getElementById('typing').classList.toggle('hidden', !data.isTyping);
                }
            };
        }
        connectWS();

        // Загрузка сообщений
        async function loadMessages() {
            const res = await fetch(`/api/chats/${chatId}/messages`, {
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
            });
            const messages = await res.json();
            messages.forEach(msg => addMessage(msg, msg.user_id !== currentUser.id));
        }

        function addMessage(msg, isTheir) {
            const div = document.createElement('div');
            div.className = `message ${isTheir ? 'their-message' : 'my-message'}`;

            let content = '';
            if (msg.media_url) {
                if (msg.media_type === 'photo') {
                    content += `<img src="${msg.media_url}" class="message-media">`;
                } else if (msg.media_type === 'video') {
                    content += `<video src="${msg.media_url}" controls class="message-media"></video>`;
                }
            }
            if (msg.text) {
                content += `<div>${msg.text}</div>`;
            }

            const time = new Date(msg.created_at).toLocaleTimeString().slice(0,5);
            content += `<div class="message-time">${time}</div>`;

            div.innerHTML = content;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        // Отправка сообщения
        async function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';

            await fetch(`/api/chats/${chatId}/messages`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${localStorage.getItem('token')}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ text })
            });
        }

        // Статус печатания
        let typingTimeout;
        document.getElementById('message-input').addEventListener('input', () => {
            ws.send(JSON.stringify({
                type: 'typing',
                chatId: parseInt(chatId),
                isTyping: true
            }));
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                ws.send(JSON.stringify({
                    type: 'typing',
                    chatId: parseInt(chatId),
                    isTyping: false
                }));
            }, 1000);
        });

        loadMessages();
    </script>
</body>
</html>
