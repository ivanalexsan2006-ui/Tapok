<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tapok · чат</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #17212b;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #2a6ee0;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .back-btn {
            background: transparent;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chat-info { flex: 1; }
        .chat-name { font-size: 18px; font-weight: bold; }
        .chat-status { font-size: 12px; opacity: 0.8; }
        .chat-actions { display: flex; gap: 10px; }
        .menu-btn {
            background: transparent;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            padding: 5px 10px;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            max-width: 70%;
            padding: 8px 12px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
        }
        .my-message {
            align-self: flex-end;
            background: #2a6ee0;
            border-bottom-right-radius: 4px;
        }
        .their-message {
            align-self: flex-start;
            background: #242f3d;
            border-bottom-left-radius: 4px;
        }
        .message-time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 4px;
            text-align: right;
        }
        .message-media {
            max-width: 200px;
            max-height: 200px;
            border-radius: 8px;
            margin: 4px 0;
            cursor: pointer;
        }
        .message-media video {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
        }
        .voice-message {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 150px;
        }
        .voice-play {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }
        .voice-wave {
            flex: 1;
            height: 30px;
            background: rgba(255,255,255,0.2);
            border-radius: 15px;
            position: relative;
            overflow: hidden;
        }
        .voice-progress {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 0%;
            background: rgba(255,255,255,0.4);
        }
        .voice-time {
            font-size: 11px;
            opacity: 0.6;
        }
        .input-area {
            background: #1e2b38;
            padding: 10px;
        }
        .preview-area {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px;
            background: #242f3d;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .preview-item {
            position: relative;
            width: 60px;
            height: 60px;
            flex-shrink: 0;
        }
        .preview-item img, .preview-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }
        .preview-remove {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #f44336;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 12px;
        }
        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .message-input {
            flex: 1;
            padding: 12px;
            background: #242f3d;
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 16px;
        }
        .action-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #2a6ee0;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .action-btn.record {
            background: #f44336;
        }
        .typing {
            color: #8a9aa8;
            font-size: 12px;
            padding: 5px 15px;
            font-style: italic;
        }
        .hidden { display: none; }
        
        /* Модалка информации о чате */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.hidden { display: none; }
        .modal-content {
            background: #242f3d;
            padding: 20px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .modal-header h3 { margin: 0; }
        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        .participant-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #17212b;
        }
        .participant-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #2a6ee0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            overflow: hidden;
        }
        .participant-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .admin-badge {
            background: gold;
            color: black;
            font-size: 10px;
            padding: 2px 5px;
            border-radius: 3px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="window.location.href='/chats.html'">←</button>
        <div class="chat-info">
            <div class="chat-name" id="chat-name">Загрузка...</div>
            <div class="chat-status" id="chat-status"></div>
        </div>
        <div class="chat-actions">
            <button class="menu-btn" onclick="showChatInfo()">⋯</button>
        </div>
    </div>

    <div class="messages" id="messages"></div>
    <div class="typing hidden" id="typing">печатает...</div>

    <div class="input-area">
        <div class="preview-area hidden" id="preview-area"></div>
        
        <div class="input-wrapper">
            <button class="action-btn" onclick="showAttachMenu()">📎</button>
            <input type="text" class="message-input" id="message-input" placeholder="Сообщение">
            <button class="action-btn" id="record-btn" onclick="toggleRecording()">🎤</button>
            <button class="action-btn" id="send-btn" onclick="sendMessage()">📤</button>
        </div>
    </div>

    <!-- Модалка информации о чате -->
    <div class="modal hidden" id="chat-info-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="info-chat-name"></h3>
                <button class="close-btn" onclick="closeChatInfo()">&times;</button>
            </div>
            <div id="participants-list"></div>
        </div>
    </div>

    <!-- Скрытый input для выбора файлов -->
    <input type="file" id="file-input" multiple accept="image/*,video/*" style="display: none;">

    <script>
        const chatId = new URLSearchParams(window.location.search).get('id');
        const currentUser = JSON.parse(localStorage.getItem('user') || '{}');
        let ws;
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;
        let recordingStartTime;
        let recordingTimer;
        let selectedFiles = [];

        if (!localStorage.getItem('token') || !chatId) {
            window.location.href = '/';
        }

        // WebSocket
        function connectWS() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}`);

            ws.onopen = () => {
                ws.send(JSON.stringify({
                    type: 'auth',
                    token: localStorage.getItem('token')
                }));
            };

            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.type === 'new_message' && data.chatId == chatId) {
                    data.messages.forEach(msg => addMessage(msg, msg.user_id !== currentUser.id));
                }
                if (data.type === 'typing' && data.chatId == chatId && data.userId !== currentUser.id) {
                    document.getElementById('typing').classList.toggle('hidden', !data.isTyping);
                }
            };
        }
        connectWS();

        // Загрузка информации о чате
        async function loadChatInfo() {
            const res = await fetch(`/api/chats/${chatId}`, {
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
            });
            const chat = await res.json();
            
            if (chat.is_group) {
                document.getElementById('chat-name').textContent = chat.name || 'Группа';
            } else {
                const other = chat.participants.find(p => p.id !== currentUser.id);
                document.getElementById('chat-name').textContent = other ? other.name : 'Чат';
            }
            
            window.chatData = chat;
        }

        // Загрузка сообщений
        async function loadMessages() {
            const res = await fetch(`/api/chats/${chatId}/messages`, {
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
            });
            const messages = await res.json();
            messages.forEach(msg => addMessage(msg, msg.user_id !== currentUser.id));
        }

        function addMessage(msg, isTheir) {
            const div = document.createElement('div');
            div.className = `message ${isTheir ? 'their-message' : 'my-message'}`;

            let content = '';
            
            // Фото
            if (msg.media_type === 'photo') {
                content += `<img src="${msg.media_url}" class="message-media" onclick="window.open('${msg.media_url}')">`;
            }
            
            // Видео
            if (msg.media_type === 'video') {
                content += `<video src="${msg.media_url}" controls class="message-media"></video>`;
            }
            
            // Голосовое
            if (msg.voice_url) {
                const duration = msg.voice_duration ? formatDuration(msg.voice_duration) : '0:03';
                content += `
                    <div class="voice-message">
                        <button class="voice-play" onclick="playVoice('${msg.voice_url}', this)">▶️</button>
                        <div class="voice-wave">
                            <div class="voice-progress" style="width: 0%"></div>
                        </div>
                        <span class="voice-time">${duration}</span>
                    </div>
                `;
            }
            
            // Текст
            if (msg.text) {
                content += `<div>${msg.text}</div>`;
            }

            const time = new Date(msg.created_at).toLocaleTimeString().slice(0,5);
            content += `<div class="message-time">${time}</div>`;

            div.innerHTML = content;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        // Отправка сообщения
        async function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            
            if (!text && selectedFiles.length === 0) return;

            const formData = new FormData();
            
            if (text) {
                formData.append('text', text);
                input.value = '';
            }

            // Добавляем файлы
            selectedFiles.forEach((file, index) => {
                if (file.type.startsWith('image/')) {
                    formData.append('photos', file);
                } else if (file.type.startsWith('video/')) {
                    formData.append('videos', file);
                }
            });

            // Очищаем превью
            selectedFiles = [];
            document.getElementById('preview-area').classList.add('hidden');
            document.getElementById('preview-area').innerHTML = '';

            await fetch(`/api/chats/${chatId}/messages`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${localStorage.getItem('token')}`
                },
                body: formData
            });
        }

        // Запись голосового
        async function toggleRecording() {
            const recordBtn = document.getElementById('record-btn');
            
            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    
                    mediaRecorder.ondataavailable = (e) => {
                        audioChunks.push(e.data);
                    };
                    
                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const duration = Math.floor((Date.now() - recordingStartTime) / 1000);
                        
                        const formData = new FormData();
                        formData.append('voice', audioBlob);
                        formData.append('duration', duration);
                        
                        await fetch(`/api/chats/${chatId}/messages`, {
                            method: 'POST',
                            headers: {
                                'Authorization': `Bearer ${localStorage.getItem('token')}`
                            },
                            body: formData
                        });
                        
                        mediaRecorder.stream.getTracks().forEach(t => t.stop());
                    };
                    
                    mediaRecorder.start();
                    isRecording = true;
                    recordingStartTime = Date.now();
                    recordBtn.classList.add('record');
                    recordBtn.textContent = '⏹️';
                    
                    // Таймер
                    recordingTimer = setInterval(() => {
                        const seconds = Math.floor((Date.now() - recordingStartTime) / 1000);
                        if (seconds >= 60) stopRecording();
                    }, 1000);
                    
                } catch (e) {
                    alert('Нет доступа к микрофону');
                }
            } else {
                stopRecording();
            }
        }

        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                clearInterval(recordingTimer);
                const recordBtn = document.getElementById('record-btn');
                recordBtn.classList.remove('record');
                recordBtn.textContent = '🎤';
            }
        }

        // Выбор файлов
        function showAttachMenu() {
            document.getElementById('file-input').click();
        }

        document.getElementById('file-input').addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            selectedFiles = [...selectedFiles, ...files];
            updatePreview();
        });

        function updatePreview() {
            const previewArea = document.getElementById('preview-area');
            
            if (selectedFiles.length === 0) {
                previewArea.classList.add('hidden');
                return;
            }

            previewArea.classList.remove('hidden');
            previewArea.innerHTML = selectedFiles.map((file, index) => {
                const url = URL.createObjectURL(file);
                if (file.type.startsWith('image/')) {
                    return `
                        <div class="preview-item">
                            <img src="${url}">
                            <button class="preview-remove" onclick="removeFile(${index})">×</button>
                        </div>
                    `;
                } else if (file.type.startsWith('video/')) {
                    return `
                        <div class="preview-item">
                            <video src="${url}"></video>
                            <button class="preview-remove" onclick="removeFile(${index})">×</button>
                        </div>
                    `;
                }
            }).join('');
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            updatePreview();
        }

        // Статус печатания
        let typingTimeout;
        document.getElementById('message-input').addEventListener('input', () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'typing',
                    chatId: parseInt(chatId),
                    isTyping: true
                }));
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    ws.send(JSON.stringify({
                        type: 'typing',
                        chatId: parseInt(chatId),
                        isTyping: false
                    }));
                }, 1000);
            }
        });

        // Информация о чате
        async function showChatInfo() {
            await loadChatInfo();
            const modal = document.getElementById('chat-info-modal');
            const nameEl = document.getElementById('info-chat-name');
            const listEl = document.getElementById('participants-list');
            
            nameEl.textContent = window.chatData.name || 'Участники';
            
            listEl.innerHTML = window.chatData.participants.map(p => `
                <div class="participant-item">
                    <div class="participant-avatar">
                        ${p.avatar ? `<img src="${p.avatar}">` : p.name[0]}
                    </div>
                    <div>
                        <div>${p.name} ${p.is_admin ? '<span class="admin-badge">admin</span>' : ''}</div>
                        <div style="font-size:12px; color:#8a9aa8;">${p.phone}</div>
                    </div>
                </div>
            `).join('');
            
            modal.classList.remove('hidden');
        }

        function closeChatInfo() {
            document.getElementById('chat-info-modal').classList.add('hidden');
        }

        // Вспомогательные функции
        function formatDuration(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        window.playVoice = (url, btn) => {
            const audio = new Audio(url);
            audio.play();
            btn.textContent = '⏸️';
            audio.onended = () => btn.textContent = '▶️';
        };

        loadChatInfo();
        loadMessages();
    </script>
</body>
</html>
