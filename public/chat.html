<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tapok · чат</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #17212b;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #2a6ee0;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .back-btn {
            background: transparent;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chat-info { flex: 1; }
        .chat-name { font-size: 18px; font-weight: bold; }
        .chat-status { font-size: 12px; opacity: 0.8; }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            max-width: 70%;
            padding: 8px 12px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
        }
        .my-message {
            align-self: flex-end;
            background: #2a6ee0;
            border-bottom-right-radius: 4px;
        }
        .their-message {
            align-self: flex-start;
            background: #242f3d;
            border-bottom-left-radius: 4px;
        }
        .message-time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 4px;
            text-align: right;
        }
        .input-area {
            background: #1e2b38;
            padding: 10px;
        }
        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .message-input {
            flex: 1;
            padding: 12px;
            background: #242f3d;
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 16px;
        }
        .send-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #2a6ee0;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }
        .typing {
            color: #8a9aa8;
            font-size: 12px;
            padding: 5px 15px;
            font-style: italic;
        }
        .hidden { display: none; }
        .error-message {
            color: #f44336;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="window.location.href='/chats.html'">←</button>
        <div class="chat-info">
            <div class="chat-name" id="chat-name">Загрузка...</div>
            <div class="chat-status" id="chat-status"></div>
        </div>
    </div>

    <div class="messages" id="messages"></div>
    <div class="typing hidden" id="typing">печатает...</div>

    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" class="message-input" id="message-input" placeholder="Сообщение">
            <button class="send-btn" onclick="sendMessage()">📤</button>
        </div>
    </div>

    <script>
        // Получаем ID чата из URL
        const urlParams = new URLSearchParams(window.location.search);
        const chatId = urlParams.get('id');
        const currentUser = JSON.parse(localStorage.getItem('user') || '{}');
        let ws;

        console.log('Chat ID:', chatId); // для отладки

        // Проверка авторизации
        if (!localStorage.getItem('token')) {
            window.location.href = '/';
        }

        // Проверка ID чата
        if (!chatId) {
            document.body.innerHTML = '<div class="error-message">Ошибка: не указан чат. <a href="/chats.html">Вернуться к чатам</a></div>';
            throw new Error('Нет ID чата');
        }

        // WebSocket
        function connectWS() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}`);

            ws.onopen = () => {
                ws.send(JSON.stringify({
                    type: 'auth',
                    token: localStorage.getItem('token')
                }));
            };

            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.type === 'new_message' && data.chatId == chatId) {
                    if (data.messages && Array.isArray(data.messages)) {
                        data.messages.forEach(msg => addMessage(msg, msg.user_id !== currentUser.id));
                    }
                }
                if (data.type === 'typing' && data.chatId == chatId && data.userId !== currentUser.id) {
                    document.getElementById('typing').classList.toggle('hidden', !data.isTyping);
                }
            };

            ws.onerror = (e) => {
                console.error('WebSocket ошибка:', e);
            };
        }
        connectWS();

        // Загрузка информации о чате
        async function loadChatInfo() {
            try {
                const res = await fetch(`/api/chats/${chatId}`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });

                if (!res.ok) {
                    if (res.status === 404) {
                        throw new Error('Чат не найден');
                    }
                    throw new Error('Ошибка загрузки');
                }

                const chat = await res.json();
                console.log('Chat data:', chat); // для отладки

                if (chat.is_group) {
                    document.getElementById('chat-name').textContent = chat.name || 'Группа';
                    document.getElementById('chat-status').textContent = chat.participants ? `${chat.participants.length} участников` : '';
                } else {
                    if (chat.participants && Array.isArray(chat.participants)) {
                        const other = chat.participants.find(p => p && p.id !== currentUser.id);
                        if (other) {
                            document.getElementById('chat-name').textContent = other.name || 'Пользователь';
                            document.getElementById('chat-status').textContent = other.status === 'online' ? 'онлайн' : 'офлайн';
                        } else {
                            document.getElementById('chat-name').textContent = 'Чат';
                        }
                    } else {
                        document.getElementById('chat-name').textContent = 'Чат';
                    }
                }
            } catch (e) {
                console.error('Ошибка загрузки чата:', e);
                document.getElementById('chat-name').textContent = 'Ошибка загрузки';
            }
        }

        // Загрузка сообщений
        async function loadMessages() {
            try {
                const res = await fetch(`/api/chats/${chatId}/messages`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });

                if (!res.ok) {
                    throw new Error('Не удалось загрузить сообщения');
                }

                const messages = await res.json();
                console.log('Messages:', messages); // для отладки

                if (messages && Array.isArray(messages)) {
                    messages.forEach(msg => addMessage(msg, msg.user_id !== currentUser.id));
                }
            } catch (e) {
                console.error('Ошибка загрузки сообщений:', e);
                document.getElementById('messages').innerHTML = '<div class="error-message">Не удалось загрузить сообщения</div>';
            }
        }

        function addMessage(msg, isTheir) {
            const messagesDiv = document.getElementById('messages');
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isTheir ? 'their-message' : 'my-message'}`;

            let content = '';
            
            if (msg.text) {
                content += `<div>${msg.text}</div>`;
            }

            const time = msg.created_at ? new Date(msg.created_at).toLocaleTimeString().slice(0,5) : '';
            content += `<div class="message-time">${time}</div>`;

            messageDiv.innerHTML = content;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Отправка сообщения
        async function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            
            if (!text) return;

            input.value = '';

            try {
                const res = await fetch(`/api/chats/${chatId}/messages`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ text })
                });

                if (!res.ok) {
                    throw new Error('Ошибка отправки');
                }
            } catch (e) {
                console.error('Ошибка отправки:', e);
                alert('Не удалось отправить сообщение');
            }
        }

        // Статус печатания
        let typingTimeout;
        document.getElementById('message-input').addEventListener('input', () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'typing',
                    chatId: parseInt(chatId),
                    isTyping: true
                }));
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    ws.send(JSON.stringify({
                        type: 'typing',
                        chatId: parseInt(chatId),
                        isTyping: false
                    }));
                }, 1000);
            }
        });
// Подписка на пуш-уведомления
async function subscribeToPush() {
    if ('Notification' in window && 'serviceWorker' in navigator) {
        try {
            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                const registration = await navigator.serviceWorker.register('/service-worker.js');
                const subscription = await registration.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: urlBase64ToUint8Array('BEl62iUYgUivxIkv69yViEuiBIa-Ib9-SkvMeAtA3LFgDzkrxZJjSgSnfckjBJuBkr3qBUYIHBQFLXYp5Nksh8U')
                });
                
                await fetch('/api/push/subscribe', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ subscription })
                });
                
                console.log('Подписан на уведомления');
            }
        } catch (e) {
            console.error('Ошибка подписки на уведомления:', e);
        }
    }
}

function urlBase64ToUint8Array(base64String) {
    const padding = '='.repeat((4 - base64String.length % 4) % 4);
    const base64 = (base64String + padding).replace(/\-/g, '+').replace(/_/g, '/');
    const rawData = window.atob(base64);
    const outputArray = new Uint8Array(rawData.length);
    for (let i = 0; i < rawData.length; ++i) {
        outputArray[i] = rawData.charCodeAt(i);
    }
    return outputArray;
}

// Вызвать при загрузке
if (localStorage.getItem('token')) {
    subscribeToPush();
}
        // Загружаем данные
        loadChatInfo();
        loadMessages();
    </script>
</body>
</html>
