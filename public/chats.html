<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tapok · чаты</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #17212b;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            color: white;
            height: 100vh;
            overflow: hidden;
        }
        .app { height: 100vh; display: flex; flex-direction: column; }
        .header {
            background: #2a6ee0;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 24px; }
        .logout-btn {
            background: transparent;
            border: 1px solid white;
            color: white;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        .search {
            padding: 10px;
            background: #1e2b38;
        }
        .search input {
            width: 100%;
            padding: 12px;
            background: #242f3d;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
        }
        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .chat-item:hover { background: #242f3d; }
        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #2a6ee0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 20px;
            overflow: hidden;
            flex-shrink: 0;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .chat-info { flex: 1; min-width: 0; }
        .chat-name { font-weight: bold; margin-bottom: 4px; }
        .chat-last { 
            color: #8a9aa8; 
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-meta { 
            text-align: right;
            margin-left: 10px;
        }
        .chat-time { font-size: 12px; color: #8a9aa8; }
        .unread-badge {
            background: #2a6ee0;
            color: white;
            border-radius: 50%;
            min-width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            margin-top: 4px;
        }
        .fab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #2a6ee0;
            color: white;
            font-size: 30px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 100;
        }
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.hidden { display: none; }
        .modal-content {
            background: #242f3d;
            padding: 20px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .modal-header h3 { margin: 0; }
        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 0 10px;
        }
        .user-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 5px;
        }
        .user-item:hover { background: #17212b; }
        .user-item.selected {
            background: #2a6ee0;
        }
        .user-checkbox {
            width: 20px;
            height: 20px;
            margin-right: 10px;
        }
        .loading { text-align: center; padding: 20px; color: #8a9aa8; }
        .group-input {
            margin: 15px 0;
        }
        .group-input input {
            width: 100%;
            padding: 10px;
            background: #17212b;
            border: none;
            color: white;
            border-radius: 5px;
        }
        .create-btn {
            width: 100%;
            padding: 12px;
            background: #2a6ee0;
            border: none;
            color: white;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        .create-btn:disabled {
            background: #4a5a6a;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>Tapok</h1>
            <button class="logout-btn" onclick="logout()">Выйти</button>
        </div>

        <div class="search">
            <input type="text" id="search-input" placeholder="Поиск чатов...">
        </div>

        <div class="chats-list" id="chats-list">
            <div class="loading">Загрузка чатов...</div>
        </div>

        <button class="fab" onclick="showNewChatModal()">+</button>
    </div>

    <!-- Модалка нового чата -->
    <div class="modal hidden" id="new-chat-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Новый чат</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            
            <div>
                <input type="text" id="search-users" placeholder="Поиск по номеру или имени..." style="width:100%; padding:10px; margin-bottom:15px; background:#17212b; border:none; color:white; border-radius:5px;">
                <div id="users-list"></div>
            </div>

            <div class="group-input">
                <input type="text" id="group-name" placeholder="Название группы (если несколько)">
            </div>

            <button class="create-btn" id="create-chat-btn" onclick="createChat()" disabled>Создать чат</button>
        </div>
    </div>

    <script>
        let currentUser = JSON.parse(localStorage.getItem('user') || '{}');
        let ws;
        let selectedUsers = [];

        if (!localStorage.getItem('token')) {
            window.location.href = '/';
        }

        // WebSocket
        function connectWS() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}`);

            ws.onopen = () => {
                ws.send(JSON.stringify({
                    type: 'auth',
                    token: localStorage.getItem('token')
                }));
            };

            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.type === 'new_message') {
                    loadChats();
                }
            };
        }
        connectWS();

        // Загрузка чатов
        async function loadChats() {
            try {
                const res = await fetch('/api/chats', {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                
                if (!res.ok) {
                    throw new Error('Ошибка загрузки');
                }
                
                const chats = await res.json();
                displayChats(chats);
            } catch (e) {
                console.error('Ошибка загрузки чатов:', e);
                document.getElementById('chats-list').innerHTML = '<div class="loading">Ошибка загрузки</div>';
            }
        }

        function displayChats(chats) {
            const list = document.getElementById('chats-list');
            
            if (!chats || chats.length === 0) {
                list.innerHTML = '<div class="loading">Нет чатов. Нажми + чтобы начать</div>';
                return;
            }

            list.innerHTML = chats.map(chat => {
                let chatName = chat.name;
                let avatar = '?';
                let lastMessageText = chat.last_message || '';

                if (!chat.is_group && chat.participants) {
                    const other = chat.participants.find(p => p && p.id !== currentUser.id);
                    if (other) {
                        chatName = other.name || 'Пользователь';
                        avatar = other.avatar ? `<img src="${other.avatar}">` : (other.name ? other.name[0] : '?');
                    }
                } else if (chat.is_group) {
                    avatar = '👥';
                }

                const time = chat.last_message_time ? new Date(chat.last_message_time).toLocaleTimeString().slice(0,5) : '';

                return `
                    <div class="chat-item" onclick="openChat(${chat.id})">
                        <div class="avatar">${avatar}</div>
                        <div class="chat-info">
                            <div class="chat-name">${chatName}</div>
                            <div class="chat-last">${lastMessageText}</div>
                        </div>
                        <div class="chat-meta">
                            <div class="chat-time">${time}</div>
                            ${chat.unread_count ? `<div class="unread-badge">${chat.unread_count}</div>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Поиск пользователей
        let searchTimeout;
        document.getElementById('search-users').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => searchUsers(e.target.value), 300);
        });

        async function searchUsers(query) {
            try {
                const res = await fetch(`/api/users/search?query=${encodeURIComponent(query)}`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                
                if (!res.ok) return;
                
                const users = await res.json();
                displayUsers(users);
            } catch (e) {
                console.error('Ошибка поиска:', e);
            }
        }

        function displayUsers(users) {
            const list = document.getElementById('users-list');
            
            if (!users || users.length === 0) {
                list.innerHTML = '<div class="loading">Ничего не найдено</div>';
                return;
            }

            list.innerHTML = users.map(user => {
                const isSelected = selectedUsers.includes(user.id);
                return `
                    <div class="user-item ${isSelected ? 'selected' : ''}" onclick="toggleUser(${user.id})">
                        <input type="checkbox" class="user-checkbox" ${isSelected ? 'checked' : ''}>
                        <div class="avatar" style="width:40px; height:40px;">
                            ${user.avatar ? `<img src="${user.avatar}">` : (user.name ? user.name[0] : '?')}
                        </div>
                        <div style="margin-left:10px;">
                            <div>${user.name || 'Без имени'}</div>
                            <div style="font-size:12px; color:#8a9aa8;">${user.phone || ''}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleUser(userId) {
            const index = selectedUsers.indexOf(userId);
            if (index === -1) {
                selectedUsers.push(userId);
            } else {
                selectedUsers.splice(index, 1);
            }
            
            displayUsersFromCurrentSearch();
            updateCreateButton();
        }

        function displayUsersFromCurrentSearch() {
            const query = document.getElementById('search-users').value;
            searchUsers(query);
        }

        function updateCreateButton() {
            const btn = document.getElementById('create-chat-btn');
            btn.disabled = selectedUsers.length === 0;
        }

        async function createChat() {
            const groupName = document.getElementById('group-name').value;
            const isGroup = selectedUsers.length > 1 || groupName;

            try {
                const res = await fetch('/api/chats', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: groupName || null,
                        isGroup: isGroup,
                        participants: selectedUsers
                    })
                });

                if (!res.ok) {
                    throw new Error('Ошибка создания чата');
                }

                const chat = await res.json();
                closeModal();
                window.location.href = `/chat.html?id=${chat.id}`;
            } catch (e) {
                console.error('Ошибка создания чата:', e);
                alert('Не удалось создать чат');
            }
        }

        function openChat(chatId) {
            if (!chatId) {
                console.error('Нет ID чата');
                return;
            }
            window.location.href = `/chat.html?id=${chatId}`;
        }

        function showNewChatModal() {
            selectedUsers = [];
            document.getElementById('new-chat-modal').classList.remove('hidden');
            document.getElementById('group-name').value = '';
            document.getElementById('search-users').value = '';
            searchUsers('');
        }

        function closeModal() {
            document.getElementById('new-chat-modal').classList.add('hidden');
            document.getElementById('users-list').innerHTML = '';
        }

        // Закрытие по клику на фон
        document.getElementById('new-chat-modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // Закрытие по Escape
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        function logout() {
            localStorage.clear();
            window.location.href = '/';
        }

        loadChats();
    </script>
</body>
</html>
