<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tapok · чаты</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* ===== ТЕМНАЯ ТЕМА (по умолчанию) ===== */
        body.dark {
            background: #17212b;
            color: white;
        }
        body.dark .header { background: #2a6ee0; }
        body.dark .search input { background: #242f3d; color: white; }
        body.dark .chat-item:hover { background: #242f3d; }
        body.dark .avatar { background: #2a6ee0; }
        body.dark .chat-last { color: #8a9aa8; }
        body.dark .chat-time { color: #8a9aa8; }
        body.dark .modal-content { background: #242f3d; }
        body.dark .user-item:hover { background: #17212b; }
        body.dark .user-item.selected { background: #2a6ee0; }
        body.dark .search-input { background: #17212b; color: white; }
        body.dark .tab-btn { color: #8a9aa8; }
        body.dark .tab-btn.active { color: #2a6ee0; border-bottom-color: #2a6ee0; }
        
        /* ===== СВЕТЛАЯ ТЕМА ===== */
        body.light {
            background: #f5f5f5;
            color: #000000;
        }
        body.light .header { background: #2a6ee0; color: white; }
        body.light .search input { 
            background: white; 
            color: #000000;
            border: 1px solid #ddd;
        }
        body.light .chat-item:hover { background: #eaeaea; }
        body.light .avatar { background: #2a6ee0; color: white; }
        body.light .chat-last { color: #666; }
        body.light .chat-time { color: #666; }
        body.light .modal-content { background: white; color: #000000; }
        body.light .user-item:hover { background: #f0f0f0; }
        body.light .user-item.selected { background: #2a6ee0; color: white; }
        body.light .search-input { 
            background: #f5f5f5; 
            color: #000000;
            border: 1px solid #ddd;
        }
        body.light .tab-btn { color: #666; }
        body.light .tab-btn.active { color: #2a6ee0; border-bottom-color: #2a6ee0; }
        body.light .loading { color: #666; }
        body.light .no-results { color: #666; }
        body.light .close-btn { color: #000000; }
        body.light .create-btn { color: white; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }
        
        .app { height: 100vh; display: flex; flex-direction: column; }
        
        .header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s;
        }
        .header h1 { font-size: 24px; }
        
        .settings-btn {
            background: transparent;
            border: 1px solid white;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            text-decoration: none;
        }
        .header-buttons {
    display: flex;
    gap: 10px;
}

.profile-btn, .settings-btn {
    background: transparent;
    border: 1px solid white;
    color: white;
    padding: 8px 15px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 5px;
    text-decoration: none;
    transition: background 0.2s;
}

.profile-btn:hover, .settings-btn:hover {
    background: rgba(255,255,255,0.1);
}

/* Для светлой темы */
body.light .profile-btn,
body.light .settings-btn {
    border-color: #2a6ee0;
    color: #2a6ee0;
}

body.light .profile-btn:hover,
body.light .settings-btn:hover {
    background: rgba(42,110,224,0.1);
}
        .search {
            padding: 10px;
        }
        .search input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: background 0.3s, color 0.3s, border 0.3s;
        }
        
        .search-results {
            position: absolute;
            top: 180px;
            left: 10px;
            right: 10px;
            background: inherit;
            border-radius: 12px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            display: none;
        }
        .search-results.show {
            display: block;
        }
        .search-result-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid rgba(128,128,128,0.2);
            cursor: pointer;
        }
        .search-result-item:last-child {
            border-bottom: none;
        }
        
        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        
        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 5px;
            cursor: pointer;
            transition: background 0.2s;
            position: relative;
        }
        
        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 20px;
            overflow: hidden;
            flex-shrink: 0;
            transition: background 0.3s;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .chat-info { flex: 1; min-width: 0; }
        .chat-name { font-weight: bold; margin-bottom: 4px; }
        .chat-last { 
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .chat-meta { 
            text-align: right;
            margin-left: 10px;
        }
        .chat-time { font-size: 12px; }
        .unread-badge {
            background: #2a6ee0;
            color: white;
            border-radius: 50%;
            min-width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            margin-top: 4px;
        }
        
        .fab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #2a6ee0;
            color: white;
            font-size: 30px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 100;
        }
        
        /* ===== МОДАЛКА С ТАБАМИ ===== */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.hidden { display: none; }
        
        .modal-content {
            padding: 20px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            transition: background 0.3s, color 0.3s;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .modal-header h3 { margin: 0; }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 0 10px;
        }
        
        /* Табы */
        .tabs {
            display: flex;
            border-bottom: 2px solid rgba(128,128,128,0.2);
            margin-bottom: 15px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            background: transparent;
            border: none;
            font-size: 14px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        
        .tab-pane {
            display: none;
        }
        .tab-pane.active {
            display: block;
        }
        
        /* Стили для списков */
        .user-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 5px;
        }
        
        .user-checkbox {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            cursor: pointer;
        }
        
        .loading { text-align: center; padding: 20px; }
        .no-results { text-align: center; padding: 20px; }
        
        .search-input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: none;
            border-radius: 5px;
            outline: none;
        }
        
        .create-btn {
            width: 100%;
            padding: 12px;
            background: #2a6ee0;
            border: none;
            color: white;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        .create-btn:disabled {
            background: #4a5a6a;
            cursor: not-allowed;
        }
        
        .group-name-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid rgba(128,128,128,0.3);
            border-radius: 5px;
            font-size: 16px;
        }
        
        .selected-count {
            font-size: 12px;
            color: #8a9aa8;
            margin-bottom: 10px;
        }
    </style>
</head>
<body class="dark">
    <div class="app">
        <div class="header">
    <h1>Tapok</h1>
    <div style="display: flex; gap: 10px;">
        <a href="/profile.html" class="settings-btn" style="background: transparent; border: 1px solid white; color: white; padding: 8px 15px; border-radius: 20px; text-decoration: none; display: flex; align-items: center; gap: 5px;">
            👤 Профиль
        </a>
        <a href="/settings.html" class="settings-btn" style="background: transparent; border: 1px solid white; color: white; padding: 8px 15px; border-radius: 20px; text-decoration: none; display: flex; align-items: center; gap: 5px;">
            ⚙️ Настройки
        </a>
    </div>
</div>
        <!-- Результаты поиска -->
        <div class="search-results" id="search-results"></div>

        <div class="chats-list" id="chats-list">
            <div class="loading">Загрузка чатов...</div>
        </div>

        <button class="fab" onclick="showNewChatModal()">+</button>
    </div>

    <!-- Модалка создания чата с табами -->
    <div class="modal hidden" id="new-chat-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Новый чат</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            
            <!-- Табы -->
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('contacts')">📱 Контакты</button>
                <button class="tab-btn" onclick="switchTab('search')">🔍 Поиск</button>
                <button class="tab-btn" onclick="switchTab('group')">👥 Создать группу</button>
            </div>
            
            <!-- Вкладка Контакты -->
            <div class="tab-pane active" id="tab-contacts">
                <div id="contacts-list" class="loading">Загрузка контактов...</div>
            </div>
            
            <!-- Вкладка Поиск -->
            <div class="tab-pane" id="tab-search">
                <input type="text" id="search-users" class="search-input" placeholder="Имя, телефон или @username">
                <div id="search-results-list" class="loading">Введите минимум 2 символа</div>
            </div>
            
            <!-- Вкладка Создать группу -->
            <div class="tab-pane" id="tab-group">
                <input type="text" id="group-name" class="group-name-input" placeholder="Название группы">
                <div id="group-candidates-list" class="loading">Загрузка...</div>
                <div class="selected-count" id="selected-count">Выбрано: 0</div>
                <button class="create-btn" id="create-group-btn" onclick="createGroup()" disabled>Создать группу</button>
            </div>
        </div>
    </div>

    <script>
        let currentUser = JSON.parse(localStorage.getItem('user') || '{}');
        let ws;
        let searchTimeout;
        let selectedUsers = [];

        if (!localStorage.getItem('token')) {
            window.location.href = '/';
        }

        // Загружаем тему
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.body.className = savedTheme;

        function connectWS() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}`);

            ws.onopen = () => {
                ws.send(JSON.stringify({
                    type: 'auth',
                    token: localStorage.getItem('token')
                }));
            };

            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.type === 'new_message') {
                    loadChats();
                }
            };
        }
        connectWS();

        // ===== ЗАГРУЗКА ЧАТОВ =====
        async function loadChats() {
            try {
                const res = await fetch('/api/chats', {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                
                if (!res.ok) throw new Error('Ошибка загрузки');
                
                const chats = await res.json();
                displayChats(chats);
            } catch (e) {
                console.error('Ошибка загрузки чатов:', e);
                document.getElementById('chats-list').innerHTML = '<div class="loading">Ошибка загрузки</div>';
            }
        }

        function displayChats(chats) {
            const list = document.getElementById('chats-list');
            
            if (!chats || chats.length === 0) {
                list.innerHTML = '<div class="loading">Нет чатов. Нажми + чтобы начать</div>';
                return;
            }

            list.innerHTML = chats.map(chat => {
                let chatName = chat.name;
                let avatar = '?';
                let lastMessageText = chat.last_message || '';

                if (chat.last_media_type === 'photo') lastMessageText = '📷 Фото';
                else if (chat.last_media_type === 'video') lastMessageText = '🎥 Видео';
                else if (chat.last_media_type === 'voice') lastMessageText = '🎤 Голосовое';

                if (!chat.is_group && chat.participants) {
                    const other = chat.participants.find(p => p && p.id !== currentUser.id);
                    if (other) {
                        chatName = other.displayName || other.name || 'Пользователь';
                        avatar = other.avatar ? `<img src="${other.avatar}">` : (other.name ? other.name[0] : '?');
                    }
                } else if (chat.is_group) {
                    avatar = '👥';
                }

                const time = chat.last_message_time ? new Date(chat.last_message_time).toLocaleTimeString().slice(0,5) : '';

                return `
                    <div class="chat-item" onclick="openChat(${chat.id})">
                        <div class="avatar">${avatar}</div>
                        <div class="chat-info">
                            <div class="chat-name">${chatName}</div>
                            <div class="chat-last">${lastMessageText}</div>
                        </div>
                        <div class="chat-meta">
                            <div class="chat-time">${time}</div>
                            ${chat.unread_count ? `<div class="unread-badge">${chat.unread_count}</div>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ===== ПОИСК ПО ЧАТАМ =====
        document.getElementById('search-input').addEventListener('input', (e) => {
            const query = e.target.value.trim();
            clearTimeout(searchTimeout);
            
            if (query.length < 2) {
                document.getElementById('search-results').classList.remove('show');
                return;
            }
            
            searchTimeout = setTimeout(() => searchChats(query), 300);
        });

        async function searchChats(query) {
            try {
                const res = await fetch(`/api/chats/search?query=${encodeURIComponent(query)}`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                
                const results = await res.json();
                displaySearchResults(results);
            } catch (e) {
                console.error('Ошибка поиска:', e);
            }
        }

        function displaySearchResults(results) {
            const resultsDiv = document.getElementById('search-results');
            
            if (results.length === 0) {
                resultsDiv.innerHTML = '<div class="no-results">Ничего не найдено</div>';
                resultsDiv.classList.add('show');
                return;
            }

            resultsDiv.innerHTML = results.map(r => `
                <div class="search-result-item" onclick="openChat(${r.id})">
                    <div class="avatar" style="width:40px; height:40px; margin-right:10px;">
                        ${r.type === 'group' ? '👥' : (r.avatar ? `<img src="${r.avatar}">` : r.name[0])}
                    </div>
                    <div>
                        <div>${r.name}</div>
                        ${r.username ? `<div style="font-size:12px; color:#8a9aa8;">@${r.username}</div>` : ''}
                    </div>
                </div>
            `).join('');
            
            resultsDiv.classList.add('show');
        }

        // ===== ТАБЫ =====
        function switchTab(tabName) {
            // Обновляем классы табов
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
            
            if (tabName === 'contacts') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('tab-contacts').classList.add('active');
                loadContacts();
            } else if (tabName === 'search') {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('tab-search').classList.add('active');
                document.getElementById('search-results-list').innerHTML = '<div class="loading">Введите минимум 2 символа</div>';
            } else if (tabName === 'group') {
                document.querySelectorAll('.tab-btn')[2].classList.add('active');
                document.getElementById('tab-group').classList.add('active');
                loadGroupCandidates();
            }
        }

        // ===== ВКЛАДКА КОНТАКТЫ =====
        async function loadContacts() {
            try {
                const res = await fetch('/api/contacts', {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                
                const contacts = await res.json();
                displayContacts(contacts);
            } catch (e) {
                console.error('Ошибка загрузки контактов:', e);
                document.getElementById('contacts-list').innerHTML = '<div class="no-results">Ошибка загрузки</div>';
            }
        }

        function displayContacts(contacts) {
            const list = document.getElementById('contacts-list');
            
            if (!contacts || contacts.length === 0) {
                list.innerHTML = '<div class="no-results">Нет контактов в Tapok</div>';
                return;
            }

            list.innerHTML = contacts.map(c => `
                <div class="user-item" onclick="openUserProfile(${c.id})">
                    <div class="avatar" style="width:40px; height:40px; margin-right:10px;">
                        ${c.avatar ? `<img src="${c.avatar}">` : (c.name ? c.name[0] : '?')}
                    </div>
                    <div>
                        <div>${c.custom_name || c.contact_name || c.name}</div>
                        ${c.username ? `<div style="font-size:12px; color:#8a9aa8;">@${c.username}</div>` : ''}
                    </div>
                </div>
            `).join('');
        }

        // ===== ВКЛАДКА ПОИСК =====
        document.getElementById('search-users').addEventListener('input', (e) => {
            const query = e.target.value.trim();
            clearTimeout(searchTimeout);
            
            if (query.length < 2) {
                document.getElementById('search-results-list').innerHTML = '<div class="loading">Введите минимум 2 символа</div>';
                return;
            }
            
            searchTimeout = setTimeout(() => searchUsers(query), 300);
        });

        async function searchUsers(query) {
            try {
                const res = await fetch(`/api/users/search?query=${encodeURIComponent(query)}`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                
                const users = await res.json();
                displaySearchUsers(users);
            } catch (e) {
                console.error('Ошибка поиска:', e);
            }
        }

        function displaySearchUsers(users) {
            const list = document.getElementById('search-results-list');
            
            if (!users || users.length === 0) {
                list.innerHTML = '<div class="no-results">Ничего не найдено</div>';
                return;
            }

            list.innerHTML = users.map(user => `
                <div class="user-item" onclick="openUserProfile(${user.id})">
                    <div class="avatar" style="width:40px; height:40px; margin-right:10px;">
                        ${user.avatar ? `<img src="${user.avatar}">` : (user.name ? user.name[0] : '?')}
                    </div>
                    <div>
                        <div>${user.name || 'Без имени'}</div>
                        ${user.username ? `<div style="font-size:12px;">@${user.username}</div>` : ''}
                    </div>
                </div>
            `).join('');
        }

        // ===== ВКЛАДКА СОЗДАНИЯ ГРУППЫ =====
        async function loadGroupCandidates() {
            try {
                const res = await fetch('/api/group-candidates', {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                
                const users = await res.json();
                displayGroupCandidates(users);
            } catch (e) {
                console.error('Ошибка загрузки кандидатов:', e);
                document.getElementById('group-candidates-list').innerHTML = '<div class="no-results">Ошибка загрузки</div>';
            }
        }

        function displayGroupCandidates(users) {
            const list = document.getElementById('group-candidates-list');
            selectedUsers = [];
            updateSelectedCount();
            
            if (!users || users.length === 0) {
                list.innerHTML = '<div class="no-results">Нет пользователей для добавления</div>';
                return;
            }

            list.innerHTML = users.map(user => `
                <div class="user-item" onclick="toggleGroupUser(${user.id})">
                    <input type="checkbox" class="user-checkbox" id="user-${user.id}">
                    <div class="avatar" style="width:40px; height:40px; margin-right:10px;">
                        ${user.avatar ? `<img src="${user.avatar}">` : (user.name ? user.name[0] : '?')}
                    </div>
                    <div>
                        <div>${user.custom_name || user.name}</div>
                        <div style="font-size:12px; color:#8a9aa8;">
                            ${user.source === 'contact' ? '📱 контакт' : '💬 переписка'}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function toggleGroupUser(userId) {
            const checkbox = document.getElementById(`user-${userId}`);
            if (checkbox) {
                checkbox.checked = !checkbox.checked;
                
                const index = selectedUsers.indexOf(userId);
                if (checkbox.checked) {
                    if (index === -1) selectedUsers.push(userId);
                } else {
                    if (index !== -1) selectedUsers.splice(index, 1);
                }
                
                updateSelectedCount();
            }
        }

        function updateSelectedCount() {
            document.getElementById('selected-count').textContent = `Выбрано: ${selectedUsers.length}`;
            document.getElementById('create-group-btn').disabled = selectedUsers.length < 2;
        }

        async function createGroup() {
            const groupName = document.getElementById('group-name').value.trim();
            
            if (selectedUsers.length < 2) {
                alert('Выберите минимум 2 участников');
                return;
            }

            try {
                const res = await fetch('/api/chats', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: groupName || 'Группа',
                        isGroup: true,
                        participants: selectedUsers
                    })
                });

                if (!res.ok) throw new Error('Ошибка создания группы');

                const chat = await res.json();
                closeModal();
                window.location.href = `/chat.html?id=${chat.id}`;
            } catch (e) {
                console.error('Ошибка создания группы:', e);
                alert('Не удалось создать группу');
            }
        }

        // ===== ОБЩИЕ ФУНКЦИИ =====
        function openUserProfile(userId) {
            closeModal();
            window.location.href = `/user-profile.html?id=${userId}`;
        }

        function openChat(chatId) {
            window.location.href = `/chat.html?id=${chatId}`;
        }

        function showNewChatModal() {
            document.getElementById('new-chat-modal').classList.remove('hidden');
            switchTab('contacts');
        }

        function closeModal() {
            document.getElementById('new-chat-modal').classList.add('hidden');
        }

        document.getElementById('new-chat-modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
                document.getElementById('search-results').classList.remove('show');
            }
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search') && !e.target.closest('.search-results')) {
                document.getElementById('search-results').classList.remove('show');
            }
        });

        loadChats();
    </script>
</body>
</html>
