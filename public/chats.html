<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tapok · чаты</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #17212b;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            color: white;
            height: 100vh;
            overflow: hidden;
        }
        .app { height: 100vh; display: flex; flex-direction: column; }
        .header {
            background: #2a6ee0;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 24px; }
        .header-buttons {
            display: flex;
            gap: 10px;
        }
        .contacts-btn, .profile-btn {
            background: transparent;
            border: 1px solid white;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .search {
            padding: 10px;
            background: #1e2b38;
        }
        .search input {
            width: 100%;
            padding: 12px;
            background: #242f3d;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
        }
        .search-results {
            position: absolute;
            top: 180px;
            left: 10px;
            right: 10px;
            background: #242f3d;
            border-radius: 12px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: none;
        }
        .search-results.show {
            display: block;
        }
        .search-result-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #1e2b38;
            cursor: pointer;
        }
        .search-result-item:last-child {
            border-bottom: none;
        }
        .search-result-item:hover {
            background: #17212b;
        }
        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 5px;
            cursor: pointer;
            transition: background 0.2s;
            position: relative;
        }
        .chat-item:hover { background: #242f3d; }
        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #2a6ee0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 20px;
            overflow: hidden;
            flex-shrink: 0;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .chat-info { flex: 1; min-width: 0; }
        .chat-name { font-weight: bold; margin-bottom: 4px; }
        .chat-last { 
            color: #8a9aa8; 
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-meta { 
            text-align: right;
            margin-left: 10px;
        }
        .chat-time { font-size: 12px; color: #8a9aa8; }
        .unread-badge {
            background: #2a6ee0;
            color: white;
            border-radius: 50%;
            min-width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            margin-top: 4px;
        }
        .fab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #2a6ee0;
            color: white;
            font-size: 30px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 100;
        }
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.hidden { display: none; }
        .modal-content {
            background: #242f3d;
            padding: 20px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .modal-header h3 { margin: 0; }
        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 0 10px;
        }
        .user-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 5px;
        }
        .user-item:hover { background: #17212b; }
        .loading { text-align: center; padding: 20px; color: #8a9aa8; }
        .search-input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background: #17212b;
            border: none;
            color: white;
            border-radius: 5px;
        }
        .create-btn {
            width: 100%;
            padding: 12px;
            background: #2a6ee0;
            border: none;
            color: white;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        .create-btn:disabled {
            background: #4a5a6a;
            cursor: not-allowed;
        }
        .no-results {
            text-align: center;
            padding: 20px;
            color: #8a9aa8;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>Tapok</h1>
            <div class="header-buttons">
                <button class="contacts-btn" onclick="window.location.href='/contacts.html'">
                    📱 Контакты
                </button>
                <button class="profile-btn" onclick="window.location.href='/profile.html'">
                    👤 Профиль
                </button>
            </div>
        </div>

        <div class="search">
            <input type="text" id="search-input" placeholder="Поиск по чатам..." autocomplete="off">
        </div>

        <!-- Результаты поиска -->
        <div class="search-results" id="search-results"></div>

        <div class="chats-list" id="chats-list">
            <div class="loading">Загрузка чатов...</div>
        </div>

        <button class="fab" onclick="showNewChatModal()">+</button>
    </div>

    <!-- Модалка поиска пользователей -->
    <div class="modal hidden" id="new-chat-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Новый чат</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            
            <div>
                <input type="text" id="search-users" class="search-input" placeholder="Имя, телефон или @username">
                <div id="users-list" class="loading">Введите имя для поиска</div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = JSON.parse(localStorage.getItem('user') || '{}');
        let ws;
        let searchTimeout;

        if (!localStorage.getItem('token')) {
            window.location.href = '/';
        }

        function connectWS() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}`);

            ws.onopen = () => {
                ws.send(JSON.stringify({
                    type: 'auth',
                    token: localStorage.getItem('token')
                }));
            };

            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.type === 'new_message') {
                    loadChats();
                }
            };
        }
        connectWS();

        // ===== ЗАГРУЗКА ЧАТОВ =====
        async function loadChats() {
            try {
                const res = await fetch('/api/chats', {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                
                if (!res.ok) throw new Error('Ошибка загрузки');
                
                const chats = await res.json();
                displayChats(chats);
            } catch (e) {
                console.error('Ошибка загрузки чатов:', e);
                document.getElementById('chats-list').innerHTML = '<div class="loading">Ошибка загрузки</div>';
            }
        }

        function displayChats(chats) {
            const list = document.getElementById('chats-list');
            
            if (!chats || chats.length === 0) {
                list.innerHTML = '<div class="loading">Нет чатов. Нажми + чтобы начать</div>';
                return;
            }

            list.innerHTML = chats.map(chat => {
                let chatName = chat.name;
                let avatar = '?';
                let lastMessageText = chat.last_message || '';

                if (chat.last_media_type === 'photo') lastMessageText = '📷 Фото';
                else if (chat.last_media_type === 'video') lastMessageText = '🎥 Видео';
                else if (chat.last_media_type === 'voice') lastMessageText = '🎤 Голосовое';

                if (!chat.is_group && chat.participants) {
                    const other = chat.participants.find(p => p && p.id !== currentUser.id);
                    if (other) {
                        chatName = other.name || 'Пользователь';
                        avatar = other.avatar ? `<img src="${other.avatar}">` : (other.name ? other.name[0] : '?');
                    }
                } else if (chat.is_group) {
                    avatar = '👥';
                }

                const time = chat.last_message_time ? new Date(chat.last_message_time).toLocaleTimeString().slice(0,5) : '';

                return `
                    <div class="chat-item" onclick="openChat(${chat.id})">
                        <div class="avatar">${avatar}</div>
                        <div class="chat-info">
                            <div class="chat-name">${chatName}</div>
                            <div class="chat-last">${lastMessageText}</div>
                        </div>
                        <div class="chat-meta">
                            <div class="chat-time">${time}</div>
                            ${chat.unread_count ? `<div class="unread-badge">${chat.unread_count}</div>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ===== ПОИСК ПО ЧАТАМ =====
        document.getElementById('search-input').addEventListener('input', (e) => {
            const query = e.target.value.trim();
            clearTimeout(searchTimeout);
            
            if (query.length < 2) {
                document.getElementById('search-results').classList.remove('show');
                return;
            }
            
            searchTimeout = setTimeout(() => searchChats(query), 300);
        });

        async function searchChats(query) {
            try {
                const res = await fetch(`/api/chats/search?query=${encodeURIComponent(query)}`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                
                const results = await res.json();
                displaySearchResults(results);
            } catch (e) {
                console.error('Ошибка поиска:', e);
            }
        }

        function displaySearchResults(results) {
            const resultsDiv = document.getElementById('search-results');
            
            if (results.length === 0) {
                resultsDiv.innerHTML = '<div class="no-results">Ничего не найдено</div>';
                resultsDiv.classList.add('show');
                return;
            }

            resultsDiv.innerHTML = results.map(r => `
                <div class="search-result-item" onclick="openChat(${r.id})">
                    <div class="avatar" style="width:40px; height:40px; margin-right:10px;">
                        ${r.type === 'group' ? '👥' : (r.avatar ? `<img src="${r.avatar}">` : r.name[0])}
                    </div>
                    <div>
                        <div>${r.name}</div>
                        ${r.username ? `<div style="font-size:12px; color:#8a9aa8;">@${r.username}</div>` : ''}
                    </div>
                </div>
            `).join('');
            
            resultsDiv.classList.add('show');
        }

        // Закрываем результаты поиска при клике вне
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search') && !e.target.closest('.search-results')) {
                document.getElementById('search-results').classList.remove('show');
            }
        });

        // ===== ПОИСК ПОЛЬЗОВАТЕЛЕЙ ДЛЯ НОВОГО ЧАТА =====
        document.getElementById('search-users').addEventListener('input', (e) => {
            const query = e.target.value.trim();
            clearTimeout(searchTimeout);
            
            if (query.length < 2) {
                document.getElementById('users-list').innerHTML = '<div class="loading">Введите минимум 2 символа</div>';
                return;
            }
            
            searchTimeout = setTimeout(() => searchUsers(query), 300);
        });

        async function searchUsers(query) {
            try {
                const res = await fetch(`/api/users/search?query=${encodeURIComponent(query)}`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                
                const users = await res.json();
                displayUsers(users);
            } catch (e) {
                console.error('Ошибка поиска:', e);
            }
        }

        function displayUsers(users) {
            const list = document.getElementById('users-list');
            
            if (!users || users.length === 0) {
                list.innerHTML = '<div class="no-results">Ничего не найдено</div>';
                return;
            }

            list.innerHTML = users.map(user => `
                <div class="user-item" onclick="openUserProfile(${user.id})">
                    <div class="avatar" style="width:40px; height:40px; margin-right:10px;">
                        ${user.avatar ? `<img src="${user.avatar}">` : (user.name ? user.name[0] : '?')}
                    </div>
                    <div>
                        <div>${user.name || 'Без имени'}</div>
                        ${user.username ? `<div style="font-size:12px; color:#8a9aa8;">@${user.username}</div>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function openUserProfile(userId) {
            closeModal();
            window.location.href = `/user-profile.html?id=${userId}`;
        }

        function openChat(chatId) {
            window.location.href = `/chat.html?id=${chatId}`;
        }

        function showNewChatModal() {
            document.getElementById('new-chat-modal').classList.remove('hidden');
            document.getElementById('search-users').value = '';
            document.getElementById('users-list').innerHTML = '<div class="loading">Введите имя для поиска</div>';
        }

        function closeModal() {
            document.getElementById('new-chat-modal').classList.add('hidden');
        }

        document.getElementById('new-chat-modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
                document.getElementById('search-results').classList.remove('show');
            }
        });

        loadChats();
    </script>
</body>
</html>
